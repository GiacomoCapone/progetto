version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: calendars-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - app-net

  backend:
    build: ./backend
    container_name: calendars-backend
    restart: always
    depends_on:
      - db
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - app-net

  frontend:
    build: ./frontend
    container_name: calendars-frontend
    restart: always
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:3000
    ports:
      - "8080:80"
    networks:
      - app-net

volumes:
  db_data:

networks:
  app-net:
    driver: bridge

